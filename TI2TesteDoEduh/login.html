<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar Resolve Aqui</title>
  <link rel="stylesheet" href="login.css" />
  <script src="auth.js"></script>
</head>
<body>

<div class="page">

  <!-- LADO ESQUERDO -->
  <div class="left-side">
    <div class="brand">
      <svg viewBox="0 0 44 44" width="52" height="52">
        <circle cx="22" cy="22" r="20" fill="#1a2f6e" stroke="#00c853" stroke-width="2.5"/>
        <path d="M14 22l6 6 10-12" stroke="#00c853" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">ProFeed</span>
    </div>

    <div class="hero-block">
      <img class="hero-img" src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=400&q=80" alt="Profissional">
      <p class="hero-caption">Solicite serviços de qualidade</p>
    </div>

    <div class="hero-block">
      <img class="hero-img" src="https://images.unsplash.com/photo-1521791136064-7986c2920216?w=400&q=80" alt="Reunião">
      <p class="hero-caption hero-caption-dark">Transforme um profissional</p>
    </div>
  </div>

  <!-- LADO DIREITO -->
  <div class="right-side">
    <div class="form-card">
      <h1 class="form-title">Entrar</h1>

      <div id="error-msg" class="error-msg" style="display:none"></div>

      <div class="field-group">
        <label class="field-label">Login</label>
        <input class="field-input" id="inp-user" type="text" placeholder="Usuário" autocomplete="username">
      </div>

      <div class="field-group">
        <label class="field-label">Senha</label>
        <div class="input-pw-wrap">
          <input class="field-input" id="inp-pw" type="password" placeholder="Senha" autocomplete="current-password">
          <button class="toggle-pw" type="button" onclick="togglePw('inp-pw', this)" aria-label="Mostrar senha">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <a class="forgot-link" href="#">Esqueci minha senha</a>
      </div>

      <button class="btn-primary" onclick="doLogin()">Entrar</button>
      <button class="btn-secondary" onclick="location.href='cadastro.html'">Registrar-se</button>
    </div>
  </div>

</div>

<script>
  redirectIfAuth();

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.querySelector('svg').style.opacity = isHidden ? '0.5' : '1';
  }

  function doLogin() {
    const username = document.getElementById('inp-user').value.trim();
    const password = document.getElementById('inp-pw').value;
    const errEl = document.getElementById('error-msg');

    if (!username || !password) {
      errEl.textContent = 'Preencha usuário e senha.';
      errEl.style.display = 'block';
      return;
    }

    const users = JSON.parse(localStorage.getItem('profeed_users') || '[]');
    const found = users.find(u => u.username === username && u.password === password);

    if (!found) {
      errEl.textContent = 'Usuário ou senha inválidos.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    setUser({ username: found.username, nome: found.nome, email: found.email, tipo: found.tipo, foto: found.foto || '' });
    window.location.href = 'index.html';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
